<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsPulse — News Trend Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .bg-glow {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(99,102,241,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 40px 20px;
            z-index: 1;
        }

        .logo {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .logo p {
            color: #64748b;
            font-size: 16px;
            margin-top: 8px;
            font-weight: 300;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        input[type="date"], input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        input[type="date"]:focus, input[type="text"]:focus {
            border-color: #818cf8;
            background: rgba(129,140,248,0.08);
            box-shadow: 0 0 0 3px rgba(129,140,248,0.1);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) opacity(0.5);
            cursor: pointer;
        }

        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.4);
        }

        .btn:active { transform: translateY(0); }

        .btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 32px;
        }

        .loader.show { display: block; }

        .loader-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .loader-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #c084fc, #38bdf8);
            border-radius: 3px;
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 70%; margin-left: 15%; }
            100% { width: 0%; margin-left: 100%; }
        }

        .loader p {
            color: #64748b;
            font-size: 14px;
        }

        .steps {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #475569;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #334155;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .step:nth-child(1) .step-dot { animation-delay: 0s; }
        .step:nth-child(2) .step-dot { animation-delay: 0.5s; }
        .step:nth-child(3) .step-dot { animation-delay: 1s; }

        @keyframes pulse {
            0%, 100% { background: #334155; transform: scale(1); }
            50% { background: #818cf8; transform: scale(1.3); }
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: #334155;
            font-size: 13px;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 24px;
        }

        .tag {
            padding: 6px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            font-size: 12px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag:hover {
            background: rgba(129,140,248,0.1);
            border-color: rgba(129,140,248,0.3);
            color: #818cf8;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="logo">
            <h1>NewsPulse ⚡</h1>
            <p>Real-time news trend analysis powered by Apache Kafka & Spark</p>
        </div>

        <div class="card">
            <form method="POST" action="/analyze" onsubmit="showLoader()">
                <div class="date-row">
                    <div class="form-group">
                        <label>From Date</label>
                        <input type="date" name="from_date" required>
                    </div>
                    <div class="form-group">
                        <label>To Date</label>
                        <input type="date" name="to_date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Topic / Keyword (optional)</label>
                    <input type="text" name="query" placeholder="e.g. technology, climate, AI, sports...">
                </div>

                <button type="submit" class="btn" id="analyzeBtn">
                    ⚡ Analyze News Trends
                </button>
            </form>

            <div class="loader" id="loader">
                <div class="loader-bar">
                    <div class="loader-bar-fill"></div>
                </div>
                <p>Analyzing trends across news sources...</p>
                <div class="steps">
                    <div class="step">
                        <div class="step-dot"></div>
                        Fetching news
                    </div>
                    <div class="step">
                        <div class="step-dot"></div>
                        Streaming via Kafka
                    </div>
                    <div class="step">
                        <div class="step-dot"></div>
                        Spark analysis
                    </div>
                </div>
            </div>
        </div>

        <div class="tags">
            <span class="tag" onclick="setQuery('technology')">🤖 Technology</span>
            <span class="tag" onclick="setQuery('climate change')">🌍 Climate</span>
            <span class="tag" onclick="setQuery('artificial intelligence')">💡 AI</span>
            <span class="tag" onclick="setQuery('politics')">🏛️ Politics</span>
            <span class="tag" onclick="setQuery('business')">📈 Business</span>
            <span class="tag" onclick="setQuery('health')">❤️ Health</span>
        </div>

        <div class="footer">
            Powered by Apache Kafka • PySpark • NewsAPI
        </div>
    </div>

    <script>
        function showLoader() {
            document.getElementById('loader').classList.add('show');
            document.getElementById('analyzeBtn').classList.add('loading');
            document.getElementById('analyzeBtn').textContent = 'Analyzing...';
        }

        function setQuery(q) {
            document.querySelector('input[name="query"]').value = q;
        }

        // Set max date to today
        const today = new Date().toISOString().split('T')[0];
        document.querySelectorAll('input[type="date"]').forEach(input => {
            input.max = today;
        });
    </script>
</body>
</html>
